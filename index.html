<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网 P2P 文件快传</title>
    <!-- 引入 PeerJS 库处理 WebRTC 握手 -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 20px; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .my-id-box { font-size: 18px; font-weight: bold; color: #0066cc; background: #e6f2ff; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 20px; letter-spacing: 1px;}
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #0066cc; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #0052a3; }
        #status { margin-top: 15px; font-size: 14px; color: #666; }
        .download-link { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>1. 你的设备 ID</h1>
        <div class="my-id-box" id="my-id">正在获取 ID...</div>
        <p style="font-size: 12px; color: #888;">* 将此 ID 告诉同一局域网下的其他设备，或者输入对方的 ID 进行连接。</p>
    </div>

    <div class="card">
        <h1>2. 连接并发送文件</h1>
        <input type="text" id="target-id" placeholder="输入接收端的设备 ID">
        <input type="file" id="file-input">
        <button onclick="connectAndSend()">发送文件</button>
        <div id="status">等待操作...</div>
    </div>

    <div class="card" id="receive-card" style="display: none;">
        <h1>3. 接收到的文件</h1>
        <div id="download-area"></div>
    </div>

    <script>
        // 初始化 Peer 实例（自动连接到 PeerJS 免费公共信令服务器）
        const peer = new Peer();
        let myId = '';

        const statusEl = document.getElementById('status');
        const myIdEl = document.getElementById('my-id');
        const receiveCard = document.getElementById('receive-card');
        const downloadArea = document.getElementById('download-area');

        // 成功获取本机的随机 ID
        peer.on('open', (id) => {
            myId = id;
            myIdEl.innerText = id;
            statusEl.innerText = '系统就绪，可以开始连接。';
        });

        // 监听其他设备发来的连接请求（作为接收方）
        peer.on('connection', (conn) => {
            statusEl.innerText = '已与发送端建立 P2P 直连！准备接收数据...';
            setupConnection(conn);
        });

        // 建立连接并发送文件（作为发送方）
        function connectAndSend() {
            const targetId = document.getElementById('target-id').value.trim();
            const fileInput = document.getElementById('file-input');

            if (!targetId) return alert('请输入对方的设备 ID！');
            if (!fileInput.files.length) return alert('请先选择一个文件！');

            const file = fileInput.files[0];
            statusEl.innerText = '正在尝试连接接收端...';

            // 发起连接
            const conn = peer.connect(targetId);
            
            conn.on('open', () => {
                statusEl.innerText = `连接成功！正在发送: ${file.name} (大小: ${(file.size/1024/1024).toFixed(2)} MB)... 请勿关闭网页。`;
                
                // 发送文件对象和元数据
                conn.send({
                    file: file,
                    filename: file.name,
                    filetype: file.type
                });
            });

            setupConnection(conn);
        }

        // 处理数据传输逻辑
        function setupConnection(conn) {
            conn.on('data', (data) => {
                // 如果收到的是文件数据
                if (data.file && data.filename) {
                    statusEl.innerText = '文件接收完成！';
                    receiveCard.style.display = 'block';

                    // 将接收到的二进制数据转换为 Blob 并生成下载链接
                    const blob = new Blob([data.file], { type: data.filetype });
                    const downloadUrl = URL.createObjectURL(blob);

                    // 创建下载按钮
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = data.filename;
                    a.className = 'download-link';
                    a.innerText = `💾 下载文件: ${data.filename}`;
                    
                    downloadArea.innerHTML = ''; // 清空之前的
                    downloadArea.appendChild(a);
                }
            });

            conn.on('error', (err) => {
                statusEl.innerText = `连接出错: ${err}`;
            });
        }
    </script>
</body>
</html>
