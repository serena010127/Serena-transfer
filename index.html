<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小火猴er快传 - 局域网</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: 30px auto; padding: 20px; background: #f7f9fa; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 18px; margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f0f2f5; padding-bottom: 12px; }
        
        .code-display { text-align: center; margin: 20px 0; }
        .code-display span { display: inline-block; font-size: 48px; font-weight: 900; color: #0066cc; background: #e6f2ff; padding: 10px 30px; border-radius: 12px; letter-spacing: 4px; }
        
        input[type="text"] { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e1e4e8; border-radius: 8px; box-sizing: border-box; font-size: 20px; text-align: center; letter-spacing: 4px; font-weight: bold; }
        input[type="text"]:focus { border-color: #0066cc; outline: none; }
        /* 提示用户可以多选 */
        input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px dashed #ccc; border-radius: 8px; box-sizing: border-box; cursor: pointer; }
        
        button { background: #0066cc; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0052a3; }
        
        #status { margin-top: 15px; font-size: 14px; font-weight: 500; color: #e67e22; text-align: center; padding: 10px; background: #fdf2e9; border-radius: 8px; display: none;}
        
        /* 调整下载按钮样式，让多个按钮排列更美观 */
        .download-btn { display: block; margin-top: 10px; margin-bottom: 10px; padding: 15px; background: #27ae60; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .download-btn:hover { background: #219a52; }
    </style>
</head>
<body>

    <div class="card">
        <h1>1. 你的本机提取码</h1>
        <div class="code-display">
            <span id="my-code">获取中</span>
        </div>
        <p style="font-size: 13px; color: #7f8c8d; text-align: center; margin: 0;">* 同一 Wi-Fi/网络下，互填代码即可直连</p>
    </div>

    <div class="card">
        <h1>2. 发送文件给对方</h1>
        <input type="text" id="target-code" maxlength="4" placeholder="输入对方的 4 位码">
        <!-- 核心改动 1：加上 multiple 属性，允许一次选中多个文件 -->
        <input type="file" id="file-input" multiple>
        <button onclick="connectAndSend()">建立连接并发送</button>
        <div id="status"></div>
    </div>

    <div class="card" id="receive-card" style="display: none;">
        <h1>3. 接收到的文件</h1>
        <div id="download-area"></div>
    </div>

    <script>
        const APP_PREFIX = "private-drop-v2-"; 
        let myCode = "";
        let peer = null;

        const statusEl = document.getElementById('status');
        const myCodeEl = document.getElementById('my-code');
        const receiveCard = document.getElementById('receive-card');
        const downloadArea = document.getElementById('download-area');

        function showStatus(text, color = "#e67e22", bgColor = "#fdf2e9") {
            statusEl.style.display = 'block';
            statusEl.innerText = text;
            statusEl.style.color = color;
            statusEl.style.backgroundColor = bgColor;
        }

        function initPeer() {
            myCode = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(APP_PREFIX + myCode);

            peer.on('open', (id) => {
                myCodeEl.innerText = myCode;
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initPeer(); 
                } else {
                    showStatus(`错误: ${err.message}`, "#c0392b", "#f9ebea");
                }
            });

            // 监听到新连接时，清空之前的下载记录
            peer.on('connection', (conn) => {
                showStatus('🟢 对方已连接！准备接收文件...', "#27ae60", "#e9f7ef");
                downloadArea.innerHTML = ''; 
                receiveCard.style.display = 'none';
                setupConnection(conn);
            });
        }

        initPeer();

        function connectAndSend() {
            const targetCode = document.getElementById('target-code').value.trim();
            const fileInput = document.getElementById('file-input');

            if (targetCode.length !== 4) return alert('请正确输入 4 位数提取码！');
            if (targetCode === myCode) return alert('不能输入自己的提取码！');
            if (!fileInput.files.length) return alert('请先选择要发送的文件！');

            const files = fileInput.files;
            showStatus('🔄 正在呼叫对方，请稍候...', "#2980b9", "#ebf5fb");

            const conn = peer.connect(APP_PREFIX + targetCode);
            
            conn.on('open', () => {
                showStatus(`🚀 连通成功！正在发送 ${files.length} 个文件... 请勿关闭网页！`, "#2980b9", "#ebf5fb");
                
                // 核心改动 2：使用循环遍历发送所有选中的文件
                for (let i = 0; i < files.length; i++) {
                    conn.send({
                        file: files[i],
                        filename: files[i].name,
                        filetype: files[i].type,
                        // 附带一个标记，告诉接收端是不是最后一个文件
                        isLast: i === files.length - 1 
                    });
                }
            });

            setupConnection(conn);
        }

        function setupConnection(conn) {
            let receivedCount = 0; // 记录收到了几个文件

            conn.on('data', (data) => {
                if (data.file && data.filename) {
                    receivedCount++;
                    receiveCard.style.display = 'block';

                    // 如果收到最后一个文件，更新状态提示
                    if (data.isLast) {
                        showStatus(`✅ 全部 ${receivedCount} 个文件接收完毕！`, "#27ae60", "#e9f7ef");
                    } else {
                        showStatus(`⏳ 正在接收... (已收到 ${receivedCount} 个)`, "#f39c12", "#fef5e7");
                    }

                    const blob = new Blob([data.file], { type: data.filetype });
                    const downloadUrl = URL.createObjectURL(blob);

                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = data.filename;
                    a.className = 'download-btn';
                    // 在文件名前加上大小显示
                    const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
                    a.innerText = `📦 下载: ${data.filename} (${sizeMB} MB)`;
                    
                    // 核心改动 3：使用 appendChild 追加按钮，而不是清空覆盖
                    downloadArea.appendChild(a);
                }
            });

            conn.on('close', () => {
                showStatus('连接已断开。');
            });
        }
    </script>
</body>
</html>
